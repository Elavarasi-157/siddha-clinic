<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; }
.home { background-color: black; padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; text-align: center; }
.header-top img { width: 60px; height: 60px; }
.header-top h1 { color: white; font-family: 'Playfair Display', serif; font-size: clamp(16px, 3vw, 26px); margin: 0; }
.nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 4px; }
.logout-btn {
  color: #ff6b6b; background: none; border: 1px solid #ff6b6b;
  border-radius: 4px; padding: 4px 14px; font-weight: bold;
  font-size: 14px; text-decoration: none; cursor: pointer;
}
.logout-btn:hover { background: #ff6b6b; color: white; }
.back-btn {
  color: white; background: #2c5f2e; border: none;
  border-radius: 4px; padding: 4px 14px; font-weight: bold;
  font-size: 14px; text-decoration: none; cursor: pointer;
}
.back-btn:hover { background: #1e4a20; }
.content { padding: 16px; }
h2 { text-align: center; font-size: clamp(18px, 4vw, 26px); margin-bottom: 20px; }
.form-table { width: 100%; max-width: 500px; margin: 0 auto; border-collapse: collapse; }
.form-table td { padding: 10px 8px; font-size: clamp(14px, 2.5vw, 18px); vertical-align: middle; }
.form-table input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 5px;
}
.form-table input:focus { outline: none; border-color: #2c5f2e; }
.submit-wrap { text-align: center; margin-top: 20px; }
.submit-wrap button {
  padding: 12px 40px;
  font-size: 16px;
  background: #2c5f2e;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
.submit-wrap button:hover { background: #1e4a20; }
</style>
</head>
<body>
<div class="home">
  <div class="header-top">
    <img src="clinic.jpg" width="60px" height="60px">
    <h1>SRI ANNAMALAIYAAR SIDDHA CLINIC</h1>
  </div>
  <div class="nav-bar">
    <a href="project.html" class="back-btn">&larr; Back</a>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">LOGOUT</a>
  </div>
</div>
<div class="content">
  <h2><u>APPOINTMENT ORDER FORM</u></h2>
  <form id="myform">
    <table class="form-table">
      <tr><td>Name</td><td><input type="text" id="name"></td></tr>
      <tr><td>Age</td><td><input type="number" id="age"></td></tr>
      <tr><td>Treatment</td><td><input type="text" id="treatment"></td></tr>
      <tr><td>Date and Time to visit</td><td><input type="datetime-local" id="date"></td></tr>
      <tr><td>Phone number</td><td><input type="number" id="phone"></td></tr>
    </table>
  </form>
  <div class="submit-wrap">
    <button onclick="store()">Submit</button>
  </div>
</div>
<script>
if (!sessionStorage.getItem('role')) window.location.href = 'login.html';
function store() {
  const appointment = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    treatment: document.getElementById("treatment").value,
    date: document.getElementById("date").value,
    phone: document.getElementById("phone").value
  };
  fetch("/api/appointments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(appointment)
  })
  .then(response => {
    if (response.ok) {
      alert("Appointment saved successfully!");
      document.getElementById("myform").reset();
    } else {
      response.text().then(t => alert("Failed: " + t));
    }
  })
  .catch(error => {
    console.error("Error:", error);
    alert("Error connecting to server.");
  });
}
</script>
</body>
</html>
