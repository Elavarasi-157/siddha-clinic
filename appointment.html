<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
.home { background-color: black; height: auto; padding: 10px 20px; }
.header-top { display: flex; align-items: center; justify-content: center; }
.header-top img { width: 80px; height: 80px; margin-right: 15px; }
.header-top h1 {
  color: white;
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  margin: 0;
}
.nav-bar {
  display: flex;
  justify-content: flex-end;
  padding: 8px 0 4px 0;
}
.logout-btn {
  color: #ff6b6b;
  background: none;
  border: 1px solid #ff6b6b;
  border-radius: 4px;
  padding: 4px 14px;
  font-weight: bold;
  font-size: 14px;
  text-decoration: none;
  cursor: pointer;
}
.logout-btn:hover { background: #ff6b6b; color: white; }
table { margin-top: 30px; font-size: 20px; }
.appointment { text-align: center; }
table { margin: auto; text-align: left; }
tr { height: 40px; }
</style>
</head>
<body>
<div class="home">
  <div class="header-top">
    <img src="clinic.jpg" width="80px" height="80px" style="padding-right:10px;">
    <h1>SRI ANNAMALAIYAAR SIDDHA CLINIC</h1>
  </div>
  <div class="nav-bar">
    <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">LOGOUT</a>
  </div>
</div>
<div class="appointment">
<h2><label style="text-decoration:underline double;margin-bottom:0px;"><b>APPOINTMENT ORDER FORM</b></label></h2>
<form id="myform">
<table>
<tr><td><label>Name</label></td><td><input type="text" id="name"></td></tr>
<tr><td><label>Age</label></td><td><input type="number" id="age"></td></tr>
<tr><td><label>Treatment</label></td><td><input type="text" id="treatment"></td></tr>
<tr><td><label>Date and Time to visit</label></td><td><input type="datetime-local" id="date"></td></tr>
<tr><td><label>Phone number</label></td><td><input type="number" id="phone"></td></tr>
</table>
</form><br>
<button style="height:40px" onclick="store()">Submit</button>
</div>
<script>
if (!sessionStorage.getItem('role')) window.location.href = 'login.html';

function store() {
  const appointment = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    treatment: document.getElementById("treatment").value,
    date: document.getElementById("date").value,
    phone: document.getElementById("phone").value
  };
  fetch("/api/appointments", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(appointment)
  })
  .then(response => {
    if (response.ok) {
      alert("Appointment saved successfully!");
      document.getElementById("myform").reset();
    } else {
      response.text().then(t => alert("Failed: " + t));
    }
  })
  .catch(error => {
    console.error("Error:", error);
    alert("Error connecting to server.");
  });
}
</script>
</body>
</html>
