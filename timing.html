<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; }
.home { background-color: black; padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; text-align: center; }
.header-top img { width: 60px; height: 60px; }
.header-top h1 { color: white; font-family: 'Playfair Display', serif; font-size: clamp(16px, 3vw, 26px); margin: 0; }
.nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 4px; }
.logout-btn {
  color: #ff6b6b; background: none; border: 1px solid #ff6b6b;
  border-radius: 4px; padding: 4px 14px; font-weight: bold;
  font-size: 14px; text-decoration: none; cursor: pointer;
}
.logout-btn:hover { background: #ff6b6b; color: white; }
.back-btn {
  color: white; background: #2c5f2e; border: none;
  border-radius: 4px; padding: 4px 14px; font-weight: bold;
  font-size: 14px; text-decoration: none; cursor: pointer;
}
.back-btn:hover { background: #1e4a20; }
.content { padding: 16px; }
h1 { font-size: clamp(20px, 4vw, 30px); text-align: center; margin: 16px 0; }
table { width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse; font-size: clamp(14px, 2.5vw, 22px); }
td, th { padding: 10px 16px; border: 1px solid #ccc; text-align: left; }
thead { background-color: #2c5f2e; color: white; }
tbody tr:nth-child(even) { background: #f0f8f0; }
</style>
</head>
<body>
<div class="home">
  <div class="header-top">
    <img src="clinic.jpg" width="60px" height="60px">
    <h1>SRI ANNAMALAIYAAR SIDDHA CLINIC</h1>
  </div>
  <div class="nav-bar">
    <a href="project.html" class="back-btn">&larr; Back</a>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">LOGOUT</a>
  </div>
</div>
<div class="content">
  <h1>🕒 Clinic Hours</h1>
  <table>
    <thead><tr><th>Day</th><th>Timings</th></tr></thead>
    <tbody>
      <tr><td>Sunday</td><td>10:00 am – 9:30 pm</td></tr>
      <tr><td>Monday</td><td>6:00 pm – 9:30 pm</td></tr>
      <tr><td>Tuesday</td><td>6:00 pm – 9:30 pm</td></tr>
      <tr><td>Wednesday</td><td>6:00 pm – 9:30 pm</td></tr>
      <tr><td>Thursday</td><td>6:00 pm – 9:30 pm</td></tr>
      <tr><td>Friday</td><td>6:00 pm – 9:30 pm</td></tr>
      <tr><td>Saturday</td><td>9:00 am – 9:30 pm</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
