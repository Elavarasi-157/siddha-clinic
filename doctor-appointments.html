<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments - Doctor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-size: 16px; }
.home { background-color: black; padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; text-align: center; }
.header-top img { width: 60px; height: 60px; }
.header-top h1 { color: white; font-family: 'Playfair Display', serif; font-size: clamp(16px, 3vw, 26px); margin: 0; }
.nav-links {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px 24px;
  padding: 10px 0;
}
.nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: clamp(13px, 2vw, 16px); }
.nav-links a:hover { color: yellow; }
.logout-btn {
  color: #ff6b6b; background: none; border: 1px solid #ff6b6b;
  border-radius: 4px; padding: 4px 12px; font-weight: bold;
  font-size: clamp(12px, 2vw, 14px); text-decoration: none; cursor: pointer;
}
.logout-btn:hover { background: #ff6b6b; color: white; }
.user-greeting { color: #aaffaa; font-size: 13px; text-align: center; margin-top: 5px; }
.panel { margin: 24px auto; width: 95%; max-width: 1000px; padding: 0 8px; }
.panel h2 { font-size: clamp(18px, 4vw, 26px); color: #2c5f2e; border-bottom: 3px solid #2c5f2e; padding-bottom: 10px; margin-bottom: 16px; }
.panel-refresh { float: right; padding: 6px 14px; background: #2c5f2e; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; margin-bottom: 10px; }
.panel-refresh:hover { background: #1e4a20; }
.table-wrap { overflow-x: auto; }
.appointments-table { width: 100%; border-collapse: collapse; font-size: clamp(13px, 2vw, 16px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 600px; }
.appointments-table thead { background-color: #2c5f2e; color: white; }
.appointments-table th, .appointments-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ddd; }
.appointments-table tbody tr:hover { background-color: #f0f8f0; }
.appointments-table tbody tr:nth-child(even) { background-color: #f9f9f9; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 13px; background: #e0f0e0; color: #2c5f2e; font-weight: bold; }
.no-data { text-align: center; color: #888; font-style: italic; padding: 30px; font-size: 18px; }
</style>
</head>
<body>
<div class="home">
  <div class="header-top">
    <img src="clinic.jpg" alt="Clinic Logo">
    <h1>SRI ANNAMALAIYAAR SIDDHA CLINIC</h1>
  </div>
  <nav class="nav-links">
    <a href="home.html">HOME</a>
    <a href="about.html">ABOUT US</a>
    <a href="contact.html">CONTACT US</a>
    <a href="review.html">LOCATION &amp; REVIEWS</a>
    <a href="treatment.html">TREATMENTS</a>
    <a href="timing.html">TIMINGS</a>
    <a href="doctor-appointments.html">PATIENT APPOINTMENTS</a>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">LOGOUT</a>
  </nav>
  <div class="user-greeting" id="userGreeting"></div>
</div>

<div class="panel">
  <button class="panel-refresh" onclick="loadAppointments()">🔄 Refresh</button>
  <h2>📋 Patients Who Booked Appointments</h2>
  <div class="table-wrap">
    <div id="appointmentsContent"><p class="no-data">Loading...</p></div>
  </div>
</div>

<script>
const role = sessionStorage.getItem('role');
if (!role) {
  window.location.href = 'login.html';
} else if (role !== 'doctor') {
  window.location.href = 'project.html';
}
document.getElementById('userGreeting').textContent = 'Logged in as Doctor';
loadAppointments();

function loadAppointments() {
  fetch('/api/appointments')
    .then(r => r.json())
    .then(data => renderAppointments(data))
    .catch(() => {
      document.getElementById('appointmentsContent').innerHTML =
        '<p class="no-data">⚠️ Error loading appointments.</p>';
    });
}

function formatDateTime(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  const day = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', weekday: 'short' });
  const time = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  return day + ' | ' + time;
}

function formatBookedOn(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderAppointments(appointments) {
  const el = document.getElementById('appointmentsContent');
  if (!appointments || appointments.length === 0) {
    el.innerHTML = '<p class="no-data">No appointments booked yet.</p>';
    return;
  }
  let html = `<table class="appointments-table">
    <thead><tr><th>#</th><th>Patient Name</th><th>Age</th><th>Treatment</th><th>Visit Date &amp; Time</th><th>Phone</th><th>Booked On</th></tr></thead><tbody>`;
  appointments.forEach((a, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td><b>${a.name || '—'}</b></td>
      <td>${a.age || '—'}</td>
      <td><span class="badge">${a.treatment || '—'}</span></td>
      <td>${formatDateTime(a.visit_date)}</td>
      <td>📱 ${a.phone || '—'}</td>
      <td>${formatBookedOn(a.booked_on)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}
</script>
</body>
</html>
