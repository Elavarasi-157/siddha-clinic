<!DOCTYPE html>
<html>
<head>
<title>Appointments - Doctor</title>
<style>
body { margin: 0; font-size: 16px; font-family: Arial, sans-serif; }
.home { background-color: black; padding: 15px; }
.header-top { display: flex; align-items: center; justify-content: center; }
.header-top img { width: 80px; height: 80px; margin-right: 15px; }
.header-top h1 { color: white; margin: 0; font-size: 26px; }
.nav-links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 50px;
  padding: 15px 0;
  flex-wrap: wrap;
}
.nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 18px; }
.nav-links a:hover { color: yellow; }
.logout-btn {
  color: #ff6b6b;
  background: none;
  border: 1px solid #ff6b6b;
  border-radius: 4px;
  padding: 4px 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  text-decoration: none;
}
.logout-btn:hover { background: #ff6b6b; color: white; }
.user-greeting { color: #aaffaa; font-size: 14px; text-align: center; margin-top: 6px; }

.panel { margin: 40px auto; width: 90%; }
.panel h2 {
  font-size: 26px;
  color: #2c5f2e;
  border-bottom: 3px solid #2c5f2e;
  padding-bottom: 10px;
  margin-bottom: 20px;
}
.appointments-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.appointments-table thead { background-color: #2c5f2e; color: white; }
.appointments-table th, .appointments-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid #ddd;
}
.appointments-table tbody tr:hover { background-color: #f0f8f0; }
.appointments-table tbody tr:nth-child(even) { background-color: #f9f9f9; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 13px;
  background: #e0f0e0;
  color: #2c5f2e;
  font-weight: bold;
}
.no-data { text-align: center; color: #888; font-style: italic; padding: 30px; font-size: 18px; }
.panel-refresh {
  float: right;
  padding: 6px 14px;
  background: #2c5f2e;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
  margin-bottom: 10px;
}
.panel-refresh:hover { background: #1e4a20; }
</style>
</head>
<body>
<div class="home">
  <div class="header-top">
    <img src="clinic.jpg" alt="Clinic Logo">
    <h1>SRI ANNAMALAIYAAR SIDDHA CLINIC</h1>
  </div>
  <nav class="nav-links">
    <a href="home.html">HOME</a>
    <a href="about.html">ABOUT US</a>
    <a href="contact.html">CONTACT US</a>
    <a href="review.html">LOCATION &amp; REVIEWS</a>
    <a href="treatment.html">TREATMENTS</a>
    <a href="timing.html">TIMINGS</a>
    <a href="doctor-appointments.html"><b>PATIENT APPOINTMENTS</b></a>
    <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">LOGOUT</a>
  </nav>
  <div class="user-greeting" id="userGreeting"></div>
</div>

<div class="panel">
  <button class="panel-refresh" onclick="loadAppointments()">🔄 Refresh</button>
  <h2>📋 Patients Who Booked Appointments</h2>
  <div id="appointmentsContent"><p class="no-data">Loading...</p></div>
</div>

<script>
const role = sessionStorage.getItem('role');

// Auth guard — only doctor can access this page
if (!role) {
  window.location.href = 'login.html';
} else if (role !== 'doctor') {
  window.location.href = 'project.html';
}

document.getElementById('userGreeting').textContent = '👨‍⚕️ Logged in as Doctor';

loadAppointments();

function loadAppointments() {
  fetch('/api/appointments')
    .then(r => r.json())
    .then(data => renderAppointments(data))
    .catch(() => {
      document.getElementById('appointmentsContent').innerHTML =
        '<p class="no-data">⚠️ Error loading appointments. Is the server running?</p>';
    });
}

function formatDateTime(raw) {
  if (!raw) return '—';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  const day = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', weekday: 'short' });
  const time = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  return day + ' | ' + time;
}

function renderAppointments(appointments) {
  const el = document.getElementById('appointmentsContent');
  if (!appointments || appointments.length === 0) {
    el.innerHTML = '<p class="no-data">No appointments booked yet.</p>';
    return;
  }
  let html = `<table class="appointments-table">
    <thead><tr><th>#</th><th>Patient Name</th><th>Age</th><th>Treatment</th><th>Visit Date &amp; Time</th><th>Phone</th><th>Booked On</th></tr></thead><tbody>`;
  appointments.forEach((a, i) => {
    html += `<tr>
      <td>${i + 1}</td>
      <td><b>${a.name || '—'}</b></td>
      <td>${a.age || '—'}</td>
      <td><span class="badge">${a.treatment || '—'}</span></td>
      <td>${formatDateTime(a.visit_date)}</td>
      <td>📱 ${a.phone || '—'}</td>
      <td>${a.booked_on || '—'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}
</script>
</body>
</html>
